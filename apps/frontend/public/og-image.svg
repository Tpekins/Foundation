<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#5a4435"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#fcfaf5" stroke-width="0.5" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="#f0b850"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="4" height="120" fill="#d65a3d"/>

  <!-- Section label -->
  <text x="108" y="205" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#f0b850" letter-spacing="3" text-transform="uppercase">TIANI PEKINS FOUNDATION</text>

  <!-- Main headline -->
  <text x="108" y="270" font-family="'Segoe UI', 'Arial Black', Helvetica, sans-serif" font-size="52" font-weight="900" fill="#fcfaf5" letter-spacing="-0.5">From red earth to</text>
  <text x="108" y="330" font-family="'Segoe UI', 'Arial Black', Helvetica, sans-serif" font-size="52" font-weight="900" fill="#fcfaf5" letter-spacing="-0.5">fingerprint sensor.</text>

  <!-- Tagline -->
  <text x="108" y="385" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#fcfaf5" opacity="0.85">A grassroots engineering foundation in Buea, Cameroon</text>
  <text x="108" y="415" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#fcfaf5" opacity="0.85">building smart infrastructure from ground to signal.</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#3a2b23"/>
  <text x="108" y="612" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#f0b850" letter-spacing="2">tianipekins.org</text>
  <text x="1092" y="612" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#7a665a" letter-spacing="1" text-anchor="end">BUEA, SILICON MOUNTAIN</text>
</svg>